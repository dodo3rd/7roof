<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>حروف مع عزيز — متابع النقاط</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family:'Cairo',sans-serif; direction:rtl;
      background:#141414; height:100%; overflow-x:hidden;
    }
    .app { min-height:100vh; background:#141414; position:relative; display:flex; flex-direction:column; }

    /* ══ HEADER ══ */
    .hdr {
      text-align:center; padding:26px 20px 12px;
      background:#141414; border-bottom:1px solid #222;
      position:relative; z-index:1; flex-shrink:0;
    }
    .logo { display:inline-block; line-height:0.88; }
    .l-h { display:block; font-size:clamp(2rem,7vw,3.8rem); font-weight:900; color:#FFD700; -webkit-text-stroke:2px #8a5500; text-shadow:0 4px 24px #8a550066; }
    .l-m { display:block; font-size:clamp(.9rem,3vw,1.6rem); font-weight:900; color:#00C2B2; -webkit-text-stroke:1px #004040; }
    .l-a { display:block; font-size:clamp(1.5rem,5vw,3rem); font-weight:900; color:#E8302A; -webkit-text-stroke:1.5px #6a0000; text-shadow:0 3px 20px #E8302A44; }
    .hdr-sub { color:#555; font-size:.75rem; margin-top:8px; letter-spacing:3px; font-weight:700; }

    /* iPad landscape header → slim horizontal bar */
    @media (min-width:900px) and (orientation:landscape) {
      .hdr { display:flex; align-items:center; justify-content:space-between; padding:10px 36px; }
      .logo { display:flex; align-items:center; gap:8px; }
      .l-h, .l-m, .l-a { display:inline; }
      .l-h { font-size:1.5rem; }
      .l-m { font-size:.9rem; margin:0 3px; }
      .l-a { font-size:1.4rem; }
      .hdr-sub { margin-top:0; font-size:.7rem; }
    }

    /* ══ PAGE WRAPPER (non-playing pages) ══ */
    .page { max-width:560px; margin:0 auto; padding:24px 18px 60px; position:relative; z-index:1; width:100%; }
    @media (min-width:900px) and (orientation:landscape) {
      .page { max-width:680px; padding:22px 28px 40px; }
    }

    /* ══ SETUP ══ */
    .setup-title { text-align:center; margin-bottom:26px; }
    .setup-title h2 { font-size:1.2rem; font-weight:800; color:#e0e0e0; margin-bottom:5px; }
    .setup-title p  { font-size:.82rem; color:#555; font-weight:600; letter-spacing:1px; }
    .pcard { border-radius:16px; margin-bottom:14px; overflow:hidden; }
    .pcard-red  { background:#1c0000; border:2px solid #5a0000; }
    .pcard-blue { background:#00071f; border:2px solid #0a2a70; }
    .pcard-stripe { height:5px; }
    .pcard-red  .pcard-stripe { background:linear-gradient(90deg,#E8302A,#ff6060); }
    .pcard-blue .pcard-stripe { background:linear-gradient(90deg,#1B6FE8,#60a5fa); }
    .pcard-inner { padding:16px 20px 20px; display:flex; align-items:center; gap:14px; }
    .pcard-icon { width:50px; height:50px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.6rem; flex-shrink:0; }
    .pcard-red  .pcard-icon { background:#2e0000; border:2px solid #5a0000; }
    .pcard-blue .pcard-icon { background:#000b2e; border:2px solid #0a2a70; }
    .pcard-fields { flex:1; }
    .pcard-label { display:block; font-size:.7rem; font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
    .pcard-red  .pcard-label { color:#cc4444; }
    .pcard-blue .pcard-label { color:#4488dd; }
    .pcard-input {
      width:100%; background:#0d0d0d; border:1.5px solid #2a2a2a;
      border-radius:10px; padding:12px 14px; font-size:1rem;
      font-family:'Cairo',sans-serif; color:#f0f0f0;
      outline:none; transition:border-color .2s,box-shadow .2s; direction:rtl;
    }
    .pcard-red  .pcard-input:focus { border-color:#E8302A; box-shadow:0 0 0 3px #E8302A22; }
    .pcard-blue .pcard-input:focus { border-color:#1B6FE8; box-shadow:0 0 0 3px #1B6FE822; }
    .pcard-input::placeholder { color:#3a3a3a; }
    .err { color:#ff5555; font-size:.88rem; text-align:center; font-weight:700; margin:10px 0 4px; }

    /* ══ BUTTONS ══ */
    .btn-start {
      width:100%; padding:16px; font-size:1.1rem; margin-top:10px;
      background:#00C2B2; color:#001a18; border:none; border-radius:14px;
      font-family:'Cairo',sans-serif; font-weight:900; cursor:pointer;
      transition:transform .13s,background .2s; box-shadow:0 4px 20px #00C2B244;
    }
    .btn-start:hover { background:#00d6c4; transform:translateY(-2px); }
    .btn-start:active { transform:scale(.97); }

    .btn-p1 {
      flex:1; padding:22px 8px; font-size:1rem; font-weight:800;
      font-family:'Cairo',sans-serif; background:#c41f1f; color:#fff;
      border:none; border-radius:12px; cursor:pointer;
      box-shadow:0 4px 14px #c41f1f44; transition:transform .13s,background .2s;
    }
    .btn-p1:hover { background:#e03030; transform:translateY(-3px); }
    .btn-p1:active { transform:scale(.96); }

    .btn-none {
      flex:1; padding:22px 8px; font-size:.78rem; font-weight:700;
      font-family:'Cairo',sans-serif; background:#1e1e1e; color:#666;
      border:1.5px solid #2e2e2e; border-radius:12px; cursor:pointer;
      transition:transform .13s,background .2s;
    }
    .btn-none:hover { background:#262626; transform:translateY(-2px); }
    .btn-none:active { transform:scale(.96); }

    .btn-p2 {
      flex:1; padding:22px 8px; font-size:1rem; font-weight:800;
      font-family:'Cairo',sans-serif; background:#1455c0; color:#fff;
      border:none; border-radius:12px; cursor:pointer;
      box-shadow:0 4px 14px #1455c044; transition:transform .13s,background .2s;
    }
    .btn-p2:hover { background:#1e6de8; transform:translateY(-3px); }
    .btn-p2:active { transform:scale(.96); }

    .btn-end-ep {
      width:100%; padding:15px; font-size:1rem; margin-top:6px;
      background:#c8960a; color:#fff8e1; border:none; border-radius:14px;
      font-family:'Cairo',sans-serif; font-weight:900; cursor:pointer;
      box-shadow:0 4px 18px #c8960a44; transition:transform .13s,background .2s;
    }
    .btn-end-ep:hover { background:#e0a80c; transform:translateY(-2px); }
    .btn-end-ep:active { transform:scale(.97); }
    .btn-end-ep:disabled { opacity:.3; cursor:default; transform:none !important; box-shadow:none; }

    .btn-next-ep {
      width:100%; padding:17px; font-size:1.05rem;
      background:#1455c0; color:#fff; border:none; border-radius:14px;
      font-family:'Cairo',sans-serif; font-weight:900; cursor:pointer;
      box-shadow:0 4px 20px #1455c055; transition:transform .13s,background .2s;
    }
    .btn-next-ep:hover { background:#1e6de8; transform:translateY(-2px); }
    .btn-next-ep:active { transform:scale(.97); }

    .btn-history {
      width:100%; padding:15px; font-size:.95rem; margin-top:10px;
      background:#1a1a1a; color:#aaa; border:2px solid #2e2e2e; border-radius:14px;
      font-family:'Cairo',sans-serif; font-weight:800; cursor:pointer;
      transition:transform .13s,background .2s;
    }
    .btn-history:hover { background:#222; transform:translateY(-2px); }
    .btn-history:active { transform:scale(.97); }

    .btn-end-all {
      width:100%; padding:13px; font-size:.9rem; margin-top:10px;
      background:#200000; color:#cc3333; border:2px solid #4a0000;
      border-radius:14px; font-family:'Cairo',sans-serif; font-weight:800;
      cursor:pointer; transition:background .2s,transform .13s;
    }
    .btn-end-all:hover { background:#2e0000; transform:translateY(-1px); }
    .btn-end-all:active { transform:scale(.97); }

    .btn-restart {
      width:100%; padding:15px; font-size:1rem; margin-top:12px;
      background:#00C2B2; color:#001a18; border:none; border-radius:14px;
      font-family:'Cairo',sans-serif; font-weight:900; cursor:pointer;
      transition:transform .13s,background .2s;
    }
    .btn-restart:hover { background:#00d6c4; transform:translateY(-2px); }
    .btn-restart:active { transform:scale(.97); }

    .btn-back {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 16px; font-size:.85rem; font-weight:700;
      font-family:'Cairo',sans-serif; background:#1a1a1a; color:#888;
      border:1.5px solid #2a2a2a; border-radius:50px;
      cursor:pointer; transition:background .2s; margin-bottom:18px;
    }
    .btn-back:hover { background:#222; }

    /* ══ EPISODE BADGE ══ */
    .ep-badge { text-align:center; margin-bottom:14px; }
    .ep-badge-inner {
      display:inline-block; background:#1c1600; border:2px solid #4a3a00;
      color:#FFD700; padding:7px 24px; border-radius:50px; font-size:.92rem; font-weight:700;
    }

    /* ══ PLAYING PAGE LAYOUT ══ */
    /* Mobile: stacked */
    .playing-layout {
      display:flex; flex-direction:column; gap:12px;
      padding:18px 16px 60px; position:relative; z-index:1;
      max-width:560px; margin:0 auto; width:100%;
    }

    /* iPad landscape: side-by-side, full height */
    @media (min-width:900px) and (orientation:landscape) {
      .playing-layout {
        flex-direction:row; align-items:stretch;
        max-width:100%; padding:16px 32px 20px;
        gap:22px;
        height:calc(100vh - 62px); /* viewport minus header */
        overflow:hidden;
      }
      .play-left  { width:36%; flex-shrink:0; display:flex; flex-direction:column; gap:14px; }
      .play-right { flex:1; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
    }

    /* ══ SCOREBOARD ══ */
    .scoreboard { display:flex; border-radius:18px; overflow:visible; position:relative; z-index:1; }

    /* Mobile: side by side */
    /* iPad: stack vertically */
    @media (min-width:900px) and (orientation:landscape) {
      .scoreboard { flex-direction:column; flex:1; min-height:0; }
    }

    .sc {
      flex:1; padding:20px 14px 16px; text-align:center;
      position:relative; border:2px solid #2a2a2a;
      transition:border-color .35s,box-shadow .35s;
    }
    .sc-red  { background:#160000; border-radius:18px 0 0 18px; border-right-color:#1e1e1e; }
    .sc-blue { background:#00040f; border-radius:0 18px 18px 0; }

    @media (min-width:900px) and (orientation:landscape) {
      .sc-red  { border-radius:18px 18px 0 0; border-right-color:#2a2a2a; border-bottom-color:#1e1e1e; }
      .sc-blue { border-radius:0 0 18px 18px; border-top:none; }
    }

    .sc-red::before  { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:#E8302A; border-radius:16px 0 0 0; }
    .sc-blue::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:#1B6FE8; border-radius:0 16px 0 0; }

    @media (min-width:900px) and (orientation:landscape) {
      .sc-red::before  { border-radius:16px 16px 0 0; }
      .sc-blue::before { height:2px; border-radius:0; }
    }

    .sc.leading { border-color:#c8a000; z-index:2; animation:goldPulse 2s ease-in-out infinite; }
    @keyframes goldPulse {
      0%,100% { box-shadow:0 0 0 1px #c8a00055,0 0 20px 5px #FFD70033,0 0 50px 14px #FFD70018,inset 0 0 28px #FFD70010; border-color:#c8a000; }
      50%      { box-shadow:0 0 0 2px #FFD70088,0 0 32px 9px #FFD70055,0 0 72px 22px #FFD70028,inset 0 0 40px #FFD70018; border-color:#FFD700; }
    }

    .sc-team { font-size:.6rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
    .sc-red  .sc-team { color:#6a2020; }
    .sc-blue .sc-team { color:#1a3a6a; }
    .sc-name { font-size:.92rem; font-weight:800; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sc-red  .sc-name { color:#dd5555; }
    .sc-blue .sc-name { color:#5599ee; }
    .sc-num { font-size:5.5rem; font-weight:900; line-height:1; letter-spacing:-4px; color:#fff; font-variant-numeric:tabular-nums; }
    @media (min-width:900px) and (orientation:landscape) { .sc-num { font-size:7rem; } }
    .sc-red  .sc-num { text-shadow:0 0 28px #E8302A88,0 3px 0 #000; }
    .sc-blue .sc-num { text-shadow:0 0 28px #1B6FE888,0 3px 0 #000; }
    .sc-pip { display:inline-block; margin-top:6px; padding:3px 12px; border-radius:50px; font-size:.66rem; font-weight:700; }
    .sc-red  .sc-pip { background:#2a0000; color:#884444; border:1px solid #3a0000; }
    .sc-blue .sc-pip { background:#000820; color:#335588; border:1px solid #0a1a40; }

    /* ══ Q BOX ══ */
    .q-box { background:#191919; border:2px solid #282828; border-radius:16px; padding:18px 16px; flex-shrink:0; }
    .q-label { text-align:center; color:#ccc; font-size:.92rem; font-weight:700; margin-bottom:12px; }
    .q-num { color:#FFD700; font-size:1.15rem; font-weight:900; }
    .q-btns { display:flex; gap:9px; }

    /* ══ Q LOG ══ */
    .q-log-wrap {
      background:#161616; border:1.5px solid #222; border-radius:14px; padding:14px 14px 10px;
    }
    @media (min-width:900px) and (orientation:landscape) {
      .q-log-wrap { flex:1; overflow-y:auto; min-height:0; }
    }
    .q-log-title { font-size:.68rem; font-weight:700; letter-spacing:2px; color:#444; text-transform:uppercase; margin-bottom:10px; }
    .q-log { display:flex; flex-direction:column; gap:6px; }
    .ql {
      display:flex; align-items:flex-start; gap:10px;
      background:#111; border-radius:10px; padding:8px 12px;
      border:1px solid #1e1e1e;
    }
    .ql-red  { border-color:#3a0000; }
    .ql-blue { border-color:#0a1a40; }
    .ql-num  { font-size:.7rem; font-weight:800; color:#444; flex-shrink:0; padding-top:2px; min-width:20px; }
    .ql-ans  { font-size:.8rem; color:#777; font-weight:600; flex:1; border-right:1px solid #252525; padding-right:10px; margin-right:4px; line-height:1.5; }
    .ql-who  { font-size:.8rem; font-weight:800; flex-shrink:0; }
    .ql-red  .ql-who { color:#dd5555; }
    .ql-blue .ql-who { color:#5599ee; }
    .ql-none .ql-who { color:#444; }
    .q-log-empty { color:#333; font-size:.82rem; text-align:center; padding:14px 0; font-weight:600; }

    /* ══ ANSWER MODAL ══ */
    .ans-modal-bg {
      position:fixed; inset:0; background:#000000e0; z-index:300;
      display:flex; align-items:center; justify-content:center; padding:24px;
    }
    .ans-modal {
      background:#181818; border-radius:22px; padding:28px 24px 24px;
      max-width:400px; width:100%;
      animation:popIn .28s cubic-bezier(.175,.885,.32,1.275);
    }
    .ans-modal-red  { border:2px solid #7a0000; }
    .ans-modal-blue { border:2px solid #0a2a70; }

    .ans-modal-header { display:flex; align-items:center; gap:12px; margin-bottom:18px; }
    .ans-modal-icon { font-size:2rem; }
    .ans-modal-title { font-size:1.05rem; font-weight:900; }
    .ans-modal-red  .ans-modal-title { color:#dd5555; }
    .ans-modal-blue .ans-modal-title { color:#5599ee; }
    .ans-modal-sub { font-size:.76rem; color:#555; margin-top:3px; font-weight:600; }

    .ans-input {
      width:100%; background:#0d0d0d; border:1.5px solid #2a2a2a;
      border-radius:12px; padding:13px 15px; font-size:1rem;
      font-family:'Cairo',sans-serif; color:#f0f0f0; direction:rtl;
      outline:none; resize:none; transition:border-color .2s; margin-bottom:16px;
    }
    .ans-modal-red  .ans-input:focus { border-color:#E8302A; box-shadow:0 0 0 3px #E8302A18; }
    .ans-modal-blue .ans-input:focus { border-color:#1B6FE8; box-shadow:0 0 0 3px #1B6FE818; }
    .ans-input::placeholder { color:#333; }

    .ans-btns { display:flex; gap:10px; }
    .ans-cancel {
      flex:1; padding:13px; font-size:.88rem; font-family:'Cairo',sans-serif;
      font-weight:700; background:#141414; color:#666;
      border:1.5px solid #2a2a2a; border-radius:12px; cursor:pointer; transition:background .2s;
    }
    .ans-cancel:hover { background:#1e1e1e; }
    .ans-confirm {
      flex:2; padding:13px; font-size:.95rem; font-family:'Cairo',sans-serif;
      font-weight:900; color:#fff; border:none; border-radius:12px;
      cursor:pointer; transition:transform .13s,background .2s;
    }
    .ans-modal-red  .ans-confirm { background:#c41f1f; box-shadow:0 4px 14px #c41f1f44; }
    .ans-modal-red  .ans-confirm:hover { background:#e03030; }
    .ans-modal-blue .ans-confirm { background:#1455c0; box-shadow:0 4px 14px #1455c044; }
    .ans-modal-blue .ans-confirm:hover { background:#1e6de8; }
    .ans-confirm:active { transform:scale(.97); }

    /* ══ DASHBOARD ══ */
    .leader-box {
      border-radius:20px; padding:24px 20px 20px;
      text-align:center; margin-bottom:14px;
      position:relative; overflow:hidden; animation:slideUp .4s ease;
    }
    .leader-box-red  { background:#1e0000; border:2px solid #8a0000; }
    .leader-box-blue { background:#00061f; border:2px solid #0a2a80; }
    .leader-box-draw { background:#141414; border:2px solid #383838; }
    .leader-box::before { content:''; position:absolute; top:0; left:-100%; width:300%; height:4px; animation:shimmer 2.5s linear infinite; }
    .leader-box-red::before  { background:linear-gradient(90deg,transparent,#E8302A,#FFD700,#E8302A,transparent); }
    .leader-box-blue::before { background:linear-gradient(90deg,transparent,#1B6FE8,#60a5fa,#1B6FE8,transparent); }
    .leader-box-draw::before { background:linear-gradient(90deg,transparent,#555,#aaa,#555,transparent); }
    @keyframes shimmer { to { left:100%; } }
    .leader-crown { font-size:2.6rem; margin-bottom:4px; animation:crownBounce 1.4s ease-in-out infinite; }
    @keyframes crownBounce { 0%,100%{transform:translateY(0) rotate(-5deg);} 50%{transform:translateY(-7px) rotate(5deg);} }
    .leader-tag { display:inline-block; font-size:.64rem; font-weight:800; letter-spacing:2.5px; text-transform:uppercase; padding:3px 14px; border-radius:50px; margin-bottom:8px; }
    .leader-box-red  .leader-tag { background:#3a0000; color:#cc4444; border:1px solid #6a0000; }
    .leader-box-blue .leader-tag { background:#000a30; color:#4488dd; border:1px solid #0a2a60; }
    .leader-box-draw .leader-tag { background:#1e1e1e; color:#666; border:1px solid #333; }
    .leader-name { font-size:2.2rem; font-weight:900; margin-bottom:6px; }
    .leader-box-red  .leader-name { color:#fff; text-shadow:0 0 30px #E8302Aaa; }
    .leader-box-blue .leader-name { color:#fff; text-shadow:0 0 30px #1B6FE8aa; }
    .leader-box-draw .leader-name { color:#666; }
    .leader-taunt { font-size:.9rem; font-weight:700; margin-bottom:13px; line-height:1.5; }
    .leader-box-red  .leader-taunt { color:#884444; }
    .leader-box-blue .leader-taunt { color:#335588; }
    .leader-box-draw .leader-taunt { color:#444; }
    .leader-score-row { display:flex; background:#0d0d0d; border-radius:12px; overflow:hidden; }
    .lsr-cell { flex:1; padding:10px 6px; text-align:center; }
    .lsr-cell:first-child { border-left:1px solid #1e1e1e; }
    .lsr-num { font-size:1.5rem; font-weight:900; }
    .lsr-num.r { color:#E8302A; }
    .lsr-num.b { color:#1B6FE8; }
    .lsr-lbl { font-size:.66rem; color:#444; font-weight:600; margin-top:2px; }

    .last-ep-strip {
      background:#111; border:1.5px solid #242424; border-radius:12px;
      padding:10px 14px; margin-bottom:13px;
      display:flex; align-items:center; justify-content:space-between;
      animation:slideUp .3s ease;
    }
    .les-left { display:flex; align-items:center; gap:10px; }
    .les-icon { font-size:1.2rem; }
    .les-ep-lbl { font-size:.66rem; color:#555; font-weight:700; letter-spacing:1px; }
    .les-result { font-size:.86rem; font-weight:800; }
    .les-result.r { color:#dd5555; }
    .les-result.b { color:#5599ee; }
    .les-result.d { color:#555; }
    .les-scores { display:flex; align-items:center; gap:8px; }
    .les-s { font-size:1rem; font-weight:900; }
    .les-s.r { color:#E8302A; }
    .les-s.b { color:#1B6FE8; }
    .les-sep { color:#2a2a2a; }

    .dash-actions-title { text-align:center; font-size:.7rem; font-weight:700; letter-spacing:2px; color:#444; text-transform:uppercase; margin-bottom:12px; }

    /* ══ HISTORY ══ */
    .hist-title { color:#888; font-size:1rem; font-weight:800; text-align:center; margin-bottom:16px; letter-spacing:1px; }
    .hist-item {
      background:#181818; border:1.5px solid #242424; border-radius:12px;
      padding:12px 16px; display:flex; align-items:center;
      justify-content:space-between; margin-bottom:6px; cursor:pointer;
      transition:background .15s;
    }
    .hist-item.open { border-radius:12px 12px 0 0; margin-bottom:0; background:#1c1c1c; border-color:#2e2e2e; }
    .hist-item:hover { background:#1e1e1e; }
    .hist-ep  { color:#444; font-size:.76rem; font-weight:600; margin-bottom:2px; }
    .hist-win { font-weight:800; font-size:.88rem; }
    .hist-win.r { color:#dd5555; } .hist-win.b { color:#5599ee; } .hist-win.d { color:#555; }
    .hist-sc  { display:flex; gap:8px; align-items:center; }
    .hs       { font-size:1.05rem; font-weight:900; }
    .hs.r     { color:#E8302A; } .hs.b { color:#1B6FE8; }
    .hs-sep   { color:#2a2a2a; }

    .hist-qs {
      background:#111; border:1.5px solid #2e2e2e; border-top:none;
      border-radius:0 0 12px 12px; padding:10px 14px 12px; margin-bottom:8px;
    }
    .hist-q-row {
      display:flex; align-items:flex-start; gap:8px;
      padding:6px 0; border-bottom:1px solid #191919;
    }
    .hist-q-row:last-child { border-bottom:none; }
    .hqr-num { font-size:.68rem; color:#333; font-weight:700; flex-shrink:0; padding-top:2px; min-width:22px; }
    .hqr-ans { font-size:.76rem; color:#666; flex:1; border-right:1px solid #1e1e1e; padding-right:8px; margin-right:4px; }
    .hqr-who { font-size:.76rem; font-weight:800; flex-shrink:0; }
    .hqr-who.r { color:#dd5555; } .hqr-who.b { color:#5599ee; } .hqr-who.n { color:#444; }

    .no-hist { text-align:center; color:#444; font-size:.92rem; font-weight:600; padding:40px 0; }

    /* ══ FINAL ══ */
    .final-card { background:#141000; border:2px solid #4a3800; border-radius:20px; padding:38px 22px; text-align:center; }
    .final-crown  { font-size:3.8rem; margin-bottom:8px; animation:bounce 1s infinite; }
    .final-lbl    { color:#666; font-size:.95rem; margin-bottom:4px; font-weight:600; }
    .final-winner { font-size:2.5rem; font-weight:900; color:#FFD700; -webkit-text-stroke:2px #8a5500; margin-bottom:16px; }
    .final-tally  { display:flex; justify-content:center; gap:28px; margin:14px 0 22px; }
    .ft     { text-align:center; }
    .ft-n   { font-size:2.8rem; font-weight:900; }
    .ft-n.win { color:#FFD700; text-shadow:0 0 24px #FFD70066; }
    .ft-n.los { color:#2a2a2a; }
    .ft-lbl { font-size:.83rem; color:#555; font-weight:700; }
    .ft-sub { font-size:.67rem; color:#3a3a3a; margin-top:2px; }
    .ft-sep { align-self:center; font-size:1.8rem; color:#222; }
    .draw-lbl { font-size:2rem; font-weight:900; color:#777; margin-bottom:12px; }

    /* ══ END CONFIRM MODAL ══ */
    .modal-bg {
      position:fixed; inset:0; background:#000000cc; z-index:200;
      display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .modal-box {
      background:#161616; border:2px solid #4a0000; border-radius:20px;
      padding:30px 24px; max-width:380px; width:100%; text-align:center;
      animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);
    }
    .modal-box h3 { color:#dd4444; font-size:1.25rem; margin-bottom:10px; font-weight:800; }
    .modal-box p  { color:#777; font-size:.9rem; margin-bottom:20px; line-height:1.7; }
    .modal-btns   { display:flex; gap:12px; }
    .modal-cancel {
      flex:1; padding:13px; font-size:.95rem; font-family:'Cairo',sans-serif;
      font-weight:700; background:#1e1e1e; color:#888;
      border:1.5px solid #2e2e2e; border-radius:12px; cursor:pointer; transition:background .2s;
    }
    .modal-cancel:hover { background:#252525; }
    .modal-confirm {
      flex:1; padding:13px; font-size:.95rem; font-family:'Cairo',sans-serif;
      font-weight:900; background:#c41f1f; color:#fff; border:none;
      border-radius:12px; cursor:pointer; transition:transform .13s,background .2s;
    }
    .modal-confirm:hover { background:#e03030; transform:translateY(-2px); }

    .hexbg { position:fixed; inset:0; width:100%; height:100%; pointer-events:none; z-index:0; }

    @keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes popIn   { from{transform:scale(.8);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ── Confetti ── */
  function Confetti({ active }) {
    const ref = useRef(null);
    useEffect(() => {
      if (!active) return;
      const canvas = ref.current; if (!canvas) return;
      const ctx = canvas.getContext("2d");
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const cols = ["#FFD700","#E8302A","#1B6FE8","#fff","#FF8C00","#60a5fa","#f472b6"];
      const pcs = Array.from({length:200},()=>({
        x:Math.random()*canvas.width, y:-20,
        w:Math.random()*14+5, h:Math.random()*9+4,
        color:cols[Math.floor(Math.random()*cols.length)],
        speed:Math.random()*4+2, angle:Math.random()*Math.PI*2,
        spin:(Math.random()-.5)*.18, drift:(Math.random()-.5)*2.5,
      }));
      let alive=true;
      const draw=()=>{
        if(!alive) return;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        pcs.forEach(p=>{
          ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.angle);
          ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
          p.y+=p.speed;p.x+=p.drift;p.angle+=p.spin;
          if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}
        });
        requestAnimationFrame(draw);
      };
      draw();
      const t=setTimeout(()=>{alive=false;ctx.clearRect(0,0,canvas.width,canvas.height);},5500);
      return()=>{alive=false;clearTimeout(t);};
    },[active]);
    if(!active) return null;
    return <canvas ref={ref} style={{position:"fixed",top:0,left:0,pointerEvents:"none",zIndex:9999}}/>;
  }

  const HexBg=()=>(
    <svg className="hexbg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hexp" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
          <polygon points="30,2 56,16 56,40 30,54 4,40 4,16"   fill="none" stroke="#2e2e2e" strokeWidth="1.5"/>
          <polygon points="60,28 86,42 86,66 60,80 34,66 34,42" fill="none" stroke="#2e2e2e" strokeWidth="1.5"/>
          <polygon points="0,28 26,42 26,66 0,80 -26,66 -26,42" fill="none" stroke="#2e2e2e" strokeWidth="1.5"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hexp)"/>
    </svg>
  );

  /* ── localStorage ── */
  const KEY="horouf_aziz_v2";
  function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return{};}}
  function useSaved(k,def){const s=load();return useState(s[k]!==undefined?s[k]:def);}

  /* ══════════════════════════ APP ══════════════════════════ */
  function App() {
    const [phase,       setPhase]       = useSaved("phase","setup");
    const [p1Input,     setP1Input]     = useState("");
    const [p2Input,     setP2Input]     = useState("");
    const [names,       setNames]       = useSaved("names",{p1:"",p2:""});
    const [episodeNum,  setEpisodeNum]  = useSaved("episodeNum",1);
    const [score,       setScore]       = useSaved("score",{p1:0,p2:0});
    const [questions,   setQuestions]   = useSaved("questions",[]);
    const [history,     setHistory]     = useSaved("history",[]);
    const [lastResult,  setLastResult]  = useSaved("lastResult",null);
    const [finalData,   setFinalData]   = useSaved("finalData",null);
    const [confetti,    setConfetti]    = useState(false);
    const [err,         setErr]         = useState("");
    const [showEndConfirm,setShowEndConfirm]=useState(false);
    const [expandedEp,  setExpandedEp] = useState(null);

    /* answer modal */
    const [ansModal, setAnsModal] = useState(null); // { winner }
    const [ansText,  setAnsText]  = useState("");
    const ansRef = useRef(null);

    useEffect(()=>{ if(ansModal&&ansRef.current) ansRef.current.focus(); },[ansModal]);

    /* persist */
    useEffect(()=>{
      localStorage.setItem(KEY,JSON.stringify({phase,names,episodeNum,score,questions,history,lastResult,finalData}));
    },[phase,names,episodeNum,score,questions,history,lastResult,finalData]);

    /* ── handlers ── */
    const handleStart=()=>{
      if(!p1Input.trim()||!p2Input.trim()){setErr("الرجاء إدخال اسمي اللاعبَين");return;}
      setNames({p1:p1Input.trim(),p2:p2Input.trim()});setPhase("playing");
    };

    const clickPlayer=(winner)=>{ setAnsText(""); setAnsModal({winner}); };

    const confirmAnswer=()=>{
      const {winner}=ansModal;
      setQuestions(q=>[...q,{n:q.length+1,winner,answer:ansText.trim()}]);
      if(winner==="p1") setScore(s=>({...s,p1:s.p1+1}));
      else if(winner==="p2") setScore(s=>({...s,p2:s.p2+1}));
      setAnsModal(null); setAnsText("");
    };

    const recordNone=()=>{ setQuestions(q=>[...q,{n:q.length+1,winner:"none",answer:""}]); };

    const endEpisode=()=>{
      if(questions.length===0) return;
      let winner="draw";
      if(score.p1>score.p2) winner="p1"; else if(score.p2>score.p1) winner="p2";
      const result={ep:episodeNum,p1:score.p1,p2:score.p2,winner,qs:[...questions]};
      setHistory(h=>[...h,result]); setLastResult(result);
      if(winner!=="draw"){setConfetti(true);setTimeout(()=>setConfetti(false),5500);}
      setPhase("dashboard");
    };

    const startNextEpisode=()=>{ setEpisodeNum(n=>n+1);setScore({p1:0,p2:0});setQuestions([]);setPhase("playing"); };

    const endAll=()=>{
      setShowEndConfirm(false);
      const wins={p1:history.filter(h=>h.winner==="p1").length,p2:history.filter(h=>h.winner==="p2").length};
      setFinalData({wins});setPhase("final");
      if(wins.p1!==wins.p2){setConfetti(true);setTimeout(()=>setConfetti(false),6000);}
    };

    const restart=()=>{
      localStorage.removeItem(KEY);
      setPhase("setup");setP1Input("");setP2Input("");setNames({p1:"",p2:""});
      setEpisodeNum(1);setScore({p1:0,p2:0});setQuestions([]);
      setHistory([]);setLastResult(null);setFinalData(null);setShowEndConfirm(false);
    };

    const totalWins={
      p1:history.filter(h=>h.winner==="p1").length,
      p2:history.filter(h=>h.winner==="p2").length,
    };

    const modalCls = ansModal?(ansModal.winner==="p1"?"ans-modal-red":"ans-modal-blue"):"";

    return (
      <>
        <Confetti active={confetti}/>
        <div className="app">
          <HexBg/>

          {/* HEADER */}
          <div className="hdr">
            <div className="logo">
              <span className="l-h">حروف</span>
              <span className="l-m">مع</span>
              <span className="l-a">عزيز</span>
            </div>
            <p className="hdr-sub">🎮 متابع الحلقات والنقاط</p>
          </div>

          {/* ══ SETUP ══ */}
          {phase==="setup"&&(
            <div className="page">
              <div className="setup-title"><h2>أدخل الأسماء مرة واحدة</h2><p>ستبقى ثابتة طوال المتابعة</p></div>
              <div className="pcard pcard-red">
                <div className="pcard-stripe"/>
                <div className="pcard-inner">
                  <div className="pcard-icon">🔴</div>
                  <div className="pcard-fields">
                    <span className="pcard-label">الفريق الأحمر</span>
                    <input className="pcard-input" placeholder="اسم اللاعب الأول..."
                      value={p1Input} onChange={e=>{setP1Input(e.target.value);setErr("");}}
                      onKeyDown={e=>e.key==="Enter"&&handleStart()}/>
                  </div>
                </div>
              </div>
              <div className="pcard pcard-blue">
                <div className="pcard-stripe"/>
                <div className="pcard-inner">
                  <div className="pcard-icon">🔵</div>
                  <div className="pcard-fields">
                    <span className="pcard-label">الفريق الأزرق</span>
                    <input className="pcard-input" placeholder="اسم اللاعب الثاني..."
                      value={p2Input} onChange={e=>{setP2Input(e.target.value);setErr("");}}
                      onKeyDown={e=>e.key==="Enter"&&handleStart()}/>
                  </div>
                </div>
              </div>
              {err&&<p className="err">{err}</p>}
              <button className="btn-start" onClick={handleStart}>✅ ابدأ المتابعة</button>
            </div>
          )}

          {/* ══ PLAYING ══ */}
          {phase==="playing"&&(
            <div className="playing-layout">

              {/* LEFT col: badge + scoreboard */}
              <div className="play-left">
                <div className="ep-badge">
                  <span className="ep-badge-inner">📺 الحلقة {episodeNum}</span>
                </div>
                <div className="scoreboard">
                  <div className={`sc sc-red${score.p1>score.p2?" leading":""}`}>
                    <div className="sc-team">الفريق الأحمر</div>
                    <div className="sc-name">🔴 {names.p1}</div>
                    <div className="sc-num">{score.p1}</div>
                    <div className="sc-pip">نقطة</div>
                  </div>
                  <div className={`sc sc-blue${score.p2>score.p1?" leading":""}`}>
                    <div className="sc-team">الفريق الأزرق</div>
                    <div className="sc-name">🔵 {names.p2}</div>
                    <div className="sc-num">{score.p2}</div>
                    <div className="sc-pip">نقطة</div>
                  </div>
                </div>
              </div>

              {/* RIGHT col: controls + log + actions */}
              <div className="play-right">
                <div className="q-box">
                  <div className="q-label">
                    السؤال <span className="q-num">{questions.length+1}</span> — من أجاب؟
                  </div>
                  <div className="q-btns">
                    <button className="btn-p1" onClick={()=>clickPlayer("p1")}>🔴 {names.p1}</button>
                    <button className="btn-none" onClick={recordNone}>🚫 لم يجب أحد</button>
                    <button className="btn-p2" onClick={()=>clickPlayer("p2")}>🔵 {names.p2}</button>
                  </div>
                </div>

                <div className="q-log-wrap">
                  <div className="q-log-title">📝 سجل الأسئلة</div>
                  {questions.length===0
                    ? <div className="q-log-empty">ستظهر الأسئلة هنا بعد التسجيل</div>
                    : <div className="q-log">
                        {[...questions].reverse().map((q,i)=>(
                          <div key={i} className={`ql ${q.winner==="p1"?"ql-red":q.winner==="p2"?"ql-blue":"ql-none"}`}>
                            <span className="ql-num">س{q.n}</span>
                            {q.answer&&<span className="ql-ans">{q.answer}</span>}
                            <span className="ql-who">
                              {q.winner==="p1"?`🔴 ${names.p1}`:q.winner==="p2"?`🔵 ${names.p2}`:"🚫 لم يجب"}
                            </span>
                          </div>
                        ))}
                      </div>
                  }
                </div>

                <button className="btn-end-ep" onClick={endEpisode} disabled={questions.length===0}>
                  🏁 إنهاء الحلقة وإعلان الفائز
                </button>
                <button className="btn-end-all" onClick={()=>setShowEndConfirm(true)}>
                  🛑 إنهاء المتابعة كلها
                </button>
              </div>

            </div>
          )}

          {/* ══ DASHBOARD ══ */}
          {phase==="dashboard"&&(()=>{
            const leader=totalWins.p1>totalWins.p2?"p1":totalWins.p2>totalWins.p1?"p2":"draw";
            const taunts={
              p1:[`${names.p1} يحكم الملعب! 🔥`,`لا أحد يقف أمام ${names.p1} 💪`,`${names.p1} جاهز يأكلكم! 😤`,`${names.p1} في قمة اللعبة 🚀`],
              p2:[`${names.p2} يحكم الملعب! 🔥`,`لا أحد يقف أمام ${names.p2} 💪`,`${names.p2} جاهز يأكلكم! 😤`,`${names.p2} في قمة اللعبة 🚀`],
              draw:["تعادل تام! من سيكسر التوازن؟ ⚡","المعركة محتدمة! 🤝🔥"],
            };
            const taunt=taunts[leader][Math.floor((episodeNum-1)%taunts[leader].length)];
            const boxCls=leader==="p1"?"leader-box-red":leader==="p2"?"leader-box-blue":"leader-box-draw";
            const crown=leader==="draw"?"⚖️":leader==="p1"?"🔴":"🔵";
            return(
              <div className="page">
                <div className={`leader-box ${boxCls}`}>
                  <div className="leader-crown">{crown}</div>
                  <div className="leader-tag">{leader==="draw"?"تعادل تام":"المتصدر الآن"}</div>
                  <div className="leader-name">{leader==="draw"?`${names.p1} & ${names.p2}`:leader==="p1"?names.p1:names.p2}</div>
                  <div className="leader-taunt">{taunt}</div>
                  <div className="leader-score-row">
                    <div className="lsr-cell"><div className="lsr-num r">{totalWins.p1}</div><div className="lsr-lbl">{names.p1}</div></div>
                    <div className="lsr-cell"><div className="lsr-num b">{totalWins.p2}</div><div className="lsr-lbl">{names.p2}</div></div>
                  </div>
                </div>
                {lastResult&&(
                  <div className="last-ep-strip">
                    <div className="les-left">
                      <div className="les-icon">{lastResult.winner==="draw"?"🤝":"🏆"}</div>
                      <div>
                        <div className="les-ep-lbl">آخر حلقة — الحلقة {lastResult.ep}</div>
                        <div className={`les-result ${lastResult.winner==="p1"?"r":lastResult.winner==="p2"?"b":"d"}`}>
                          {lastResult.winner==="draw"?"تعادل":`فاز ${lastResult.winner==="p1"?names.p1:names.p2}`}
                        </div>
                      </div>
                    </div>
                    <div className="les-scores">
                      <span className="les-s r">{lastResult.p1}</span>
                      <span className="les-sep">—</span>
                      <span className="les-s b">{lastResult.p2}</span>
                    </div>
                  </div>
                )}
                <div className="dash-actions-title">ماذا تريد أن تفعل؟</div>
                <button className="btn-next-ep" onClick={startNextEpisode}>▶️ العب الحلقة {episodeNum+1}</button>
                <button className="btn-history" onClick={()=>setPhase("history")}>📋 استعرض الحلقات السابقة</button>
                <button className="btn-end-all" onClick={()=>setShowEndConfirm(true)}>🛑 إنهاء المتابعة كلها وإعلان الفائز النهائي</button>
              </div>
            );
          })()}

          {/* ══ HISTORY ══ */}
          {phase==="history"&&(
            <div className="page">
              <button className="btn-back" onClick={()=>setPhase("dashboard")}>← رجوع للرئيسية</button>
              <div className="hist-title">📋 سجل الحلقات</div>
              {history.length===0
                ?<div className="no-hist">لا توجد حلقات مسجلة بعد</div>
                :[...history].reverse().map(h=>(
                  <div key={h.ep}>
                    <div className={`hist-item${expandedEp===h.ep?" open":""}`}
                         onClick={()=>setExpandedEp(expandedEp===h.ep?null:h.ep)}>
                      <div>
                        <div className="hist-ep">الحلقة {h.ep}{h.qs?.length?` · ${h.qs.length} أسئلة`:""}</div>
                        <div className={`hist-win ${h.winner==="p1"?"r":h.winner==="p2"?"b":"d"}`}>
                          {h.winner==="draw"?"🤝 تعادل":h.winner==="p1"?`🏆 ${names.p1}`:`🏆 ${names.p2}`}
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div className="hist-sc">
                          <span className="hs r">{h.p1}</span>
                          <span className="hs-sep">—</span>
                          <span className="hs b">{h.p2}</span>
                        </div>
                        <span style={{color:"#333",fontSize:".75rem"}}>{expandedEp===h.ep?"▲":"▼"}</span>
                      </div>
                    </div>
                    {expandedEp===h.ep&&h.qs&&h.qs.length>0&&(
                      <div className="hist-qs">
                        {h.qs.map((q,i)=>(
                          <div key={i} className="hist-q-row">
                            <span className="hqr-num">س{q.n}</span>
                            {q.answer&&<span className="hqr-ans">{q.answer}</span>}
                            <span className={`hqr-who ${q.winner==="p1"?"r":q.winner==="p2"?"b":"n"}`}>
                              {q.winner==="p1"?`🔴 ${names.p1}`:q.winner==="p2"?`🔵 ${names.p2}`:"🚫"}
                            </span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                ))
              }
            </div>
          )}

          {/* ══ FINAL ══ */}
          {phase==="final"&&finalData&&(()=>{
            const {wins}=finalData;
            const gw=wins.p1>wins.p2?"p1":wins.p2>wins.p1?"p2":"draw";
            return(
              <div className="page">
                <div className="final-card">
                  {gw==="draw"
                    ?(<><div className="final-crown">🤝</div><div className="draw-lbl">تعادل رائع!</div><p style={{color:"#555",marginBottom:18,fontSize:".88rem"}}>انتهت المتابعة بتعادل بين الفريقين</p></>)
                    :(<><div className="final-crown">👑</div><div className="final-lbl">الفائز النهائي</div><div className="final-winner">{gw==="p1"?names.p1:names.p2} 🎊</div></>)
                  }
                  <div className="final-tally">
                    <div className="ft"><div className={`ft-n ${gw==="p1"?"win":"los"}`}>{wins.p1}</div><div className="ft-lbl">{names.p1}</div><div className="ft-sub">حلقة فائزة</div></div>
                    <div className="ft-sep">—</div>
                    <div className="ft"><div className={`ft-n ${gw==="p2"?"win":"los"}`}>{wins.p2}</div><div className="ft-lbl">{names.p2}</div><div className="ft-sub">حلقة فائزة</div></div>
                  </div>
                  <button className="btn-history" onClick={()=>setPhase("history")} style={{marginBottom:0}}>📋 استعرض سجل الحلقات</button>
                  <button className="btn-restart" onClick={restart}>🔄 بدء متابعة جديدة</button>
                </div>
              </div>
            );
          })()}

        </div>

        {/* ══ ANSWER MODAL ══ */}
        {ansModal&&(
          <div className="ans-modal-bg" onClick={e=>e.target===e.currentTarget&&(setAnsModal(null),setAnsText(""))}>
            <div className={`ans-modal ${modalCls}`}>
              <div className="ans-modal-header">
                <div className="ans-modal-icon">{ansModal.winner==="p1"?"🔴":"🔵"}</div>
                <div>
                  <div className="ans-modal-title">أجاب {ansModal.winner==="p1"?names.p1:names.p2} ✅</div>
                  <div className="ans-modal-sub">سجّل الإجابة (اختياري) ثم اضغط تأكيد</div>
                </div>
              </div>
              <textarea
                ref={ansRef}
                className="ans-input"
                rows={2}
                placeholder="اكتب الإجابة هنا..."
                value={ansText}
                onChange={e=>setAnsText(e.target.value)}
                onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();confirmAnswer();} }}
              />
              <div className="ans-btns">
                <button className="ans-cancel" onClick={()=>{setAnsModal(null);setAnsText("");}}>إلغاء</button>
                <button className="ans-confirm" onClick={confirmAnswer}>✅ تأكيد النقطة</button>
              </div>
            </div>
          </div>
        )}

        {/* ══ END CONFIRM MODAL ══ */}
        {showEndConfirm&&(
          <div className="modal-bg">
            <div className="modal-box">
              <h3>🛑 إنهاء المتابعة؟</h3>
              <p>هل أنت متأكد أنك تريد إنهاء المتابعة كلها والإعلان عن الفائز النهائي؟<br/>لن تتمكن من العودة بعد ذلك.</p>
              <div className="modal-btns">
                <button className="modal-cancel" onClick={()=>setShowEndConfirm(false)}>لا، تراجع</button>
                <button className="modal-confirm" onClick={endAll}>نعم، أنهِ</button>
              </div>
            </div>
          </div>
        )}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
